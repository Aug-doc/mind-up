<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main>

        <a href="index.html">
            <img class="home-icon" src="../images/home-icon.png" alt="Voltar">
        </a>

        <section>
            <h1>Criar Conta</h1>

            <form action="#" method="post">

                <div>
                    <label for="nome">Nome completo</label>
                    <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required>
                </div>

                <div>
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" placeholder="Digite seu e-mail" required>
                </div>

                <div>
                    <label for="usuario">Usuário</label>
                    <input type="text" id="usuario" name="usuario" placeholder="Crie um usuário" required>
                </div>

                <div>
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" name="senha" placeholder="Crie uma senha" required>
                </div>

                <div>
                    <label for="confirmarSenha">Confirmar senha</label>
                    <input type="password" id="confirmarSenha" name="confirmarSenha" placeholder="Confirme sua senha"
                        required>
                </div>

                <button type="submit">
                    Cadastrar
                </button>

                <button type="reset">
                    Limpar dados
                </button>

            </form>

            <p>
                Já possui uma conta?
                <a href="login.html">Fazer login</a>
            </p>

        </section>
    </main>

</body>

</html>
