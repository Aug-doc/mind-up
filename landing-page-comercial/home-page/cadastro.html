<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main>

        <a href="index.html">
            <img class="home-icon" src="../images/home-icon.png" alt="Voltar">
        </a>

        <section>
            <h1>Criar Conta</h1>

            <form id="meuFormulario" action="#" method="post">

                <div>
                    <label for="nome">Nome completo</label>
                    <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required>
                </div>

                <div>
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" placeholder="Digite seu e-mail" required>
                </div>

                <div>
                    <label for="usuario">Usuário</label>
                    <input type="text" id="usuario" name="usuario" placeholder="Crie um usuário" required>
                </div>

                <div>
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" name="senha" placeholder="Crie uma senha" required>
                </div>

                <div>
                    <label for="confirmarSenha">Confirmar senha</label>
                    <input type="password" id="confirmarSenha" name="confirmarSenha" placeholder="Confirme sua senha"
                        required>
                </div>

                <button type="submit">
                    Cadastrar
                </button>

                <button type="reset">
                    Limpar dados
                </button>

            </form>

            <p>
                Já possui uma conta?
                <a href="login.html">Fazer login</a>
            </p>

        </section>
    </main>

</body>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    // 1. Conectar a Landing Page com o SEU projeto do Supabase
    const SUPABASE_URL = "https://dzyhycnydelypjikdzfz.supabase.co";
    const SUPABASE_KEY = "sb_publishable_AorNgK-aFdY54z9Fjb_8Xg_E2VSrQ_y";

    // Correção sutil: Inicialização correta usando a biblioteca global do CDN
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 2. Escutar o clique no botão de "Enviar" do formulário
    const formulario = document.getElementById('meuFormulario'); 

    formulario.addEventListener('submit', async (e) => {
        e.preventDefault(); // Impede a página de recarregar

        // 3. Pegar o que o usuário digitou nos campos
        const emailUsuario = document.getElementById('email').value;
        const senhaUsuario = document.getElementById('senha').value;
        const confirmarSenhaUsuario = document.getElementById('confirmarSenha').value;

        // MELHORIA PARA O TCC: Validar se as senhas são iguais antes de mandar pro banco
        if (senhaUsuario !== confirmarSenhaUsuario) {
            alert("As senhas não coincidem! Verifique e tente novamente.");
            return; // Para a execução aqui
        }

        try {
            // 4. Enviar os dados para a ferramenta de Autenticação do Supabase
            const { data, error } = await _supabase.auth.signUp({
                email: emailUsuario,
                password: senhaUsuario,
            });

            if (error) {
                alert("Erro ao cadastrar: " + error.message);
            } else {
                alert("Cadastro realizado com sucesso! Agora você pode logar no app.");
                formulario.reset(); // Limpa os campos do formulário
            }

        } catch (err) {
            console.error(err);
            alert("Ocorreu um erro inesperado.");
        }
    });
</script>

</html>
